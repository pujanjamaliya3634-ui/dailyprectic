<!DOCTYPE html>
<html>
<head>
    <title>Time Table</title>
    <style>
        table {
            border-collapse: collapse;
            width: 500px;
            text-align: center;
        }

        th, td {
            border: 2px solid black;
            padding: 8px;
        }

        .title {
            font-size: 24px;
            font-weight: bold;
        }

        .lunch {
            font-weight: bold;
            font-size: 20px;
        }
    </style>
</head>
<body>

<table>
    <tr>
        <th colspan="6" class="title">Time Table</th>
    </tr>

    <tr>
        <td rowspan="6">Hours</td>
        <th>mon</th>
        <th>tues</th>
        <th>Wed</th>
        <th>Thrus</th>
        <th>Fri</th>
    </tr>

    <tr>
        <td>Science</td>
        <td>Maths</td>
        <td>Science</td>
        <td>Maths</td>
        <td>Arts</td>
    </tr>

    <tr>
        <td>Science</td>
        <td>Maths</td>
        <td>Science</td>
        <td>Maths</td>
        <td>Arts</td>
    </tr>

    <tr>
        <td colspan="5" class="lunch">Lunch</td>
    </tr>

    <tr>
        <td>Science</td>
        <td>Maths</td>
        <td>Science</td>
        <td>Maths</td>
        <td rowspan="2">Project</td>
    </tr>

    <tr>
        <td> Maths</td>
        <td>Science</td>
        <td>Maths</td>
        <td>Science</td>
        
    </tr>

</table>

</body>
</html>
